version: '3.8'

services:
  trading-service:
    image: trading-service:latest
    container_name: trading-service
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - TZ=America/Los_Angeles
    volumes:
      - /usr/share/zoneinfo/America/Los_Angeles:/etc/localtime:ro
      - ./logs:/app/logs
    ports:
      - "3031:8080"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
